        config:
          as_number: 65000
          vrfs:
            - vrf: NIR-Chaos
              neighbors:
                - neighbor_address: "{{ item }}"
                  shutdown: "{{ shutdown }}"
      loop: ["198.18.224.13", "198.18.224.15"]
