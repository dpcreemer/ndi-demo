---
- name: Core-A1
  hosts: core_a1
  gather_facts: no

  tasks:
    - name: "Manage Peers"
      cisco.nxos.nxos_bgp_global:
        config:
          as_number: 65000
          neighbors:
            - neighbor_address: "{{ item }}"
              shutdown: "{{ shutdown }}"
      loop: ["172.21.96.1", "172.21.96.5"]

- name: Core-A2
  hosts: core_a2
  gather_facts: no

  tasks:
    - name: "Manage Peers"
      cisco.nxos.nxos_bgp_global:
        config:
          as_number: 65000
          neighbors:
            - neighbor_address: "{{ item }}"
              shutdown: "{{ shutdown }}"
      loop: ["172.21.96.3", "172.21.96.7"]

- name: Core-B1
  hosts: core_b1
  gather_facts: no

  tasks:
    - name: "Manage ACI Peers"
      cisco.nxos.nxos_bgp_global:
        config:
          as_number: 65000
          neighbors:
            - neighbor_address: "{{ item }}"
              shutdown: "{{ shutdown }}"
      loop: ["198.18.226.137", "198.18.226.141"]

    - name: "Manage VXLAN Peers"
      cisco.nxos.nxos_bgp_global:
        config:
          as_number: 65000
          vrfs:
            - vrf: NIR-Chaos
              neighbors:
                - neighbor_address: "{{ item }}"
                  shutdown: "{{ shutdown }}"
      loop: ["198.18.224.9", "198.18.224.11"]

